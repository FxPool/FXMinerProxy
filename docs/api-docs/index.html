<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FXMinerProxy API Documentation</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--accent:#58a6ff;--text:#e6edf3;--dim:#8b949e;--dim2:#6e7681;--get:#3fb950;--post:#58a6ff;--del:#f85149;--get-bg:rgba(63,185,80,.08);--post-bg:rgba(88,166,255,.08);--del-bg:rgba(248,81,73,.08);--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC','Noto Sans',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
code,pre{font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace}
.topbar{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(13,17,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar h1{font-size:16px;font-weight:600}.topbar h1 em{font-style:normal;color:var(--accent)}
.topbar .ctrls{display:flex;gap:8px;align-items:center}
.topbar input{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px;width:220px;font-size:13px;outline:none;transition:border .2s}
.topbar input:focus{border-color:var(--accent)}
.topbar button{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600;transition:border .2s}
.topbar button:hover{border-color:var(--accent)}
.layout{display:flex;min-height:calc(100vh - 49px)}
.sidebar{position:sticky;top:49px;width:280px;min-width:280px;height:calc(100vh - 49px);overflow-y:auto;padding:16px 12px;border-right:1px solid var(--border);background:var(--bg);font-size:13px}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sidebar .sg{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim2);margin:16px 0 6px 8px;font-weight:600}.sidebar .sg:first-child{margin-top:4px}
.sidebar a{display:flex;align-items:center;gap:6px;padding:4px 8px;margin:1px 0;color:var(--dim);border-radius:5px;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar a:hover{background:var(--card);color:var(--text)}
.sidebar .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-get{background:var(--get)}.dot-post{background:var(--post)}.dot-del,.dot-delete{background:var(--del)}
.main{flex:1;padding:28px 36px;max-width:1060px}
.stats{display:flex;gap:20px;padding-bottom:20px;margin-bottom:8px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{font-size:12px;color:var(--dim)}.stat b{font-size:18px;color:var(--text);display:block;margin-bottom:1px}
.grp-title{font-size:20px;font-weight:600;margin:40px 0 4px;padding-bottom:8px;border-bottom:1px solid var(--border)}.grp-title:first-of-type{margin-top:12px}
.grp-desc{color:var(--dim);font-size:13px;margin-bottom:16px}
.grp-badge{font-size:11px;color:var(--dim);background:var(--card);border:1px solid var(--border);padding:1px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
.no-res{text-align:center;padding:60px;color:var(--dim);display:none}
.api{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border .2s}
.api:hover{border-color:var(--accent)}
.api-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none}
.api-head .mtag{padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
.mtag-GET{color:var(--get);background:var(--get-bg)}.mtag-POST{color:var(--post);background:var(--post-bg)}.mtag-DELETE{color:var(--del);background:var(--del-bg)}
.api-head .path{font-size:13px;font-weight:500;font-family:'SF Mono','Fira Code',Consolas,monospace;word-break:break-all}
.api-head .desc{margin-left:auto;font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px;flex-shrink:0}
.api-head .arrow{color:var(--dim2);font-size:14px;margin-left:8px;transition:transform .2s;flex-shrink:0}
.api.open .arrow{transform:rotate(90deg)}
.api-body{display:none;padding:0 18px 16px;border-top:1px solid var(--border)}.api.open .api-body{display:block}
.ds{margin-top:14px}.ds h4{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.detail-desc{font-size:13px;color:var(--dim);margin-bottom:10px;line-height:1.5;padding-top:12px}
.ab{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;margin-right:6px}
.ab-admin{color:#d29922;background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.2)}
.ab-login{color:var(--accent);background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15)}
.ab-2nd{color:#f85149;background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.15)}
.ab-none{color:var(--get);background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.15)}
.ab-ws{color:#bc8cff;background:rgba(188,140,255,.08);border:1px solid rgba(188,140,255,.15)}
table.pt{width:100%;border-collapse:collapse;font-size:12.5px}
table.pt th{text-align:left;color:var(--dim);font-weight:600;padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
table.pt td{padding:6px 10px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:top}
.pn{color:var(--accent);font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:12px;white-space:nowrap}
.pn-nested{color:#bc8cff}
.pt-type{color:var(--dim2);font-size:11px;white-space:nowrap}
.pt-y{color:#d29922;font-size:11px}.pt-n{color:var(--dim2);font-size:11px}
pre.cb{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;font-size:12px;line-height:1.5;overflow-x:auto;color:var(--text);margin:0;white-space:pre-wrap;word-break:break-all}
.htag{font-size:11px;color:var(--dim2);font-family:'SF Mono','Fira Code',Consolas,monospace;margin-top:10px;opacity:.7}
.nest-label{background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--dim);margin-left:4px;vertical-align:middle}
@media(max-width:860px){.sidebar{display:none}.main{padding:16px 12px}.topbar input{width:140px}.api-head .desc{display:none}}
</style>
</head>
<body>
<div class="topbar">
  <h1><em>FXMinerProxy</em> API Documentation</h1>
  <div class="ctrls">
    <input id="search" placeholder="Search..." autocomplete="off">
    <button id="toggleAll" onclick="toggleAllCards()">Expand All</button>
    <button id="langBtn" onclick="toggleLang()"></button>
  </div>
</div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main" id="main"></div>
</div>
<script>
let lang=localStorage.getItem('api_doc_lang')||(navigator.language||navigator.userLanguage||'en').startsWith('zh')?'zh':'en',allExpanded=false;
if(localStorage.getItem('api_doc_lang'))lang=localStorage.getItem('api_doc_lang');
function t(o){return typeof o==='string'?o:(o&&o[lang])||''}
function Y(){return lang==='zh'?'是':'Yes'}
function N(){return lang==='zh'?'否':'No'}
function TH(){return lang==='zh'?['参数名','类型','必填','说明']:['Name','Type','Req','Description']}

function ptable(rows){
  if(!rows||!rows.length)return'';
  const h=TH();
  let s='<table class="pt"><thead><tr>';
  h.forEach(c=>s+=`<th>${c}</th>`);
  s+='</tr></thead><tbody>';
  rows.forEach(r=>{
    const cls=r.nest?'pn pn-nested':'pn';
    const pre=r.nest?'&nbsp;&nbsp;↳ ':'';
    s+=`<tr><td class="${cls}">${pre}${r.n}</td><td class="pt-type">${r.t}</td><td class="${r.r?'pt-y':'pt-n'}">${r.r?Y():N()}</td><td>${t(r.d)}</td></tr>`;
  });
  return s+'</tbody></table>';
}

function renderApi(a,gi,ai){
  const aid=`api-${gi}-${ai}`;
  const desc=t(a.d);
  const short=desc.length>50?desc.substring(0,50)+'...':desc;
  let ab='';
  if(a.auth==='admin')ab+=`<span class="ab ab-admin">${lang==='zh'?'管理员':'Admin'}</span>`;
  else if(a.auth==='login')ab+=`<span class="ab ab-login">${lang==='zh'?'登录即可':'Login'}</span>`;
  else ab+=`<span class="ab ab-none">${lang==='zh'?'无需鉴权':'No Auth'}</span>`;
  if(a.a2)ab+=`<span class="ab ab-2nd">${lang==='zh'?'需二级密码':'2nd Password'}</span>`;
  if(a.ws)ab+=`<span class="ab ab-ws">WebSocket</span>`;
  let body=`<p class="detail-desc">${desc}</p><div class="ds"><h4>${lang==='zh'?'鉴权':'Auth'}</h4>${ab}</div>`;
  if(a.query&&a.query.length)body+=`<div class="ds"><h4>${lang==='zh'?'请求参数':'Request Parameters'}</h4>${ptable(a.query)}</div>`;
  if(a.bodyJson&&a.bodyJson.length)body+=`<div class="ds"><h4>${lang==='zh'?'请求体 (JSON)':'Request Body (JSON)'}</h4>${ptable(a.bodyJson)}</div>`;
  if(a.bodyForm&&a.bodyForm.length)body+=`<div class="ds"><h4>${lang==='zh'?'请求体 (Form)':'Request Body (Form)'}</h4>${ptable(a.bodyForm)}</div>`;
  if(a.bodyMp&&a.bodyMp.length)body+=`<div class="ds"><h4>${lang==='zh'?'请求体 (Multipart)':'Request Body (Multipart)'}</h4>${ptable(a.bodyMp)}</div>`;
  if(a.resp){let rv=typeof a.resp==='object'?t(a.resp):a.resp;let r=rv;try{r=JSON.stringify(JSON.parse(rv),null,2)}catch(e){}body+=`<div class="ds"><h4>${lang==='zh'?'响应示例':'Response Example'}</h4><pre class="cb">${r.replace(/</g,'&lt;')}</pre></div>`;}
  body+=`<div class="htag">Handler: ${a.h}</div>`;
  return `<div class="api" id="${aid}" data-s="${a.m} ${a.p} ${t(a.d)} ${a.h}"><div class="api-head" onclick="this.parentElement.classList.toggle('open')"><span class="mtag mtag-${a.m}">${a.m}</span><span class="path">${a.p}</span><span class="desc">${short}</span><span class="arrow">▸</span></div><div class="api-body">${body}</div></div>`;
}

function render(){
  let mh='',sh='',total=0,gc=0,pc=0,dc=0;
  API.forEach(g=>g.apis.forEach(a=>{total++;if(a.m==='GET')gc++;else if(a.m==='POST')pc++;else dc++}));
  mh+=`<div class="stats"><div class="stat"><b>${total}</b>${lang==='zh'?'接口总数':'Total'}</div><div class="stat"><b style="color:var(--get)">${gc}</b>GET</div><div class="stat"><b style="color:var(--post)">${pc}</b>POST</div><div class="stat"><b style="color:var(--del)">${dc}</b>DELETE</div></div>`;
  mh+=renderAuth();
  sh+=`<div class="sg">${lang==='zh'?'鉴权说明':'Auth'}</div><a href="#grp-auth"><span class="dot" style="background:#d29922"></span>${lang==='zh'?'鉴权说明':'Authentication'}</a>`;
  API.forEach((g,gi)=>{
    const gn=t(g.group);
    mh+=`<h2 class="grp-title" id="grp-${gi}">${gn}<span class="grp-badge">${g.apis.length}</span></h2><p class="grp-desc">${t(g.desc)}</p>`;
    sh+=`<div class="sg">${gn}</div>`;
    g.apis.forEach((a,ai)=>{mh+=renderApi(a,gi,ai);sh+=`<a href="#api-${gi}-${ai}"><span class="dot dot-${a.m.toLowerCase()==='delete'?'del':a.m.toLowerCase()}"></span>${a.p.replace(/^\/api\//,'').replace(/^\/download\//,'dl/')}</a>`;});
  });
  mh+=`<div class="no-res" id="noRes">${lang==='zh'?'没有匹配的 API':'No matching APIs'}</div>`;
  document.getElementById('main').innerHTML=mh;
  document.getElementById('sidebar').innerHTML=sh;
  document.getElementById('toggleAll').textContent=allExpanded?(lang==='zh'?'全部折叠':'Collapse All'):(lang==='zh'?'全部展开':'Expand All');
}

function toggleLang(){lang=lang==='zh'?'en':'zh';localStorage.setItem('api_doc_lang',lang);document.getElementById('langBtn').textContent=lang==='zh'?'EN':'中文';document.documentElement.lang=lang==='zh'?'zh-CN':'en';render();applySearch();}
function toggleAllCards(){allExpanded=!allExpanded;document.querySelectorAll('.api').forEach(c=>{allExpanded?c.classList.add('open'):c.classList.remove('open')});document.getElementById('toggleAll').textContent=allExpanded?(lang==='zh'?'全部折叠':'Collapse All'):(lang==='zh'?'全部展开':'Expand All');}
function applySearch(){const q=document.getElementById('search').value.trim().toLowerCase();let v=0;document.querySelectorAll('.api[data-s]').forEach(c=>{const s=!q||c.dataset.s.toLowerCase().includes(q);c.style.display=s?'':'none';if(s)v++});document.querySelectorAll('.grp-title').forEach((s,i)=>{const cs=document.querySelectorAll(`.api[id^="api-${i}-"]`);const any=Array.from(cs).some(c=>c.style.display!=='none');s.style.display=any?'':'none';const d=s.nextElementSibling;if(d&&d.classList.contains('grp-desc'))d.style.display=any?'':'none'});const nr=document.getElementById('noRes');if(nr)nr.style.display=v===0?'block':'none';}
document.getElementById('search').addEventListener('input',applySearch);
document.getElementById('langBtn').textContent=lang==='zh'?'EN':'中文';
document.documentElement.lang=lang==='zh'?'zh-CN':'en';
render();
</script>
</body>
</html>
